version: 2

# Coverage note: every pinned artifact below is Dependabot-managed, including
# SHA-pinned actions (Dependabot rewrites both the hash and its "# vX" comment).
# The one deliberate exception is the Node major in /.nvmrc: Dependabot has no
# updater for that file. It pins a major only ("24"), so CI picks up patch and
# minor Node releases on its own and only the yearly major bump is a manual
# edit. Locally a version manager honours .nvmrc only after one-time shell
# setup (see docs/DEVELOPER.md). Pinning an exact Node version here would rot
# silently instead.
updates:
  - package-ecosystem: nuget
    directory: /
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: "deps"
    labels:
      - dependencies
      - dotnet
    open-pull-requests-limit: 10
    groups:
      nuget-minor-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: "ci"
    labels:
      - dependencies
      - ci
    open-pull-requests-limit: 5
    groups:
      actions-all:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  - package-ecosystem: npm
    directory: /segment_reporting
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: "deps(js)"
    labels:
      - dependencies
      - javascript
    open-pull-requests-limit: 5
    groups:
      npm-minor-patch:
        update-types:
          - minor
          - patch
