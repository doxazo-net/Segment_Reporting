# Watches upstream Emby releases and proposes a bump before the pinned version
# is pruned. Emby deletes old 4.10.x pre-releases on a short rolling window, so
# a static pin eventually 404s and breaks CI for reasons unrelated to this repo.
#
# PRs are opened by the segrep-emby-bump GitHub App, not GITHUB_TOKEN: GitHub
# suppresses workflow runs for events raised by the default token, so a PR it
# created would receive no CI at all.

name: Emby version watch

on:
  schedule:
    - cron: "23 5 * * 1"
  workflow_dispatch:

permissions: {}

jobs:
  watch:
    runs-on: ubuntu-latest
    permissions: {}

    steps:
      - name: Mint App token
        id: app-token
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2
        with:
          app-id: ${{ secrets.EMBY_BUMP_APP_ID }}
          private-key: ${{ secrets.EMBY_BUMP_APP_KEY }}
          # Without these the token inherits every permission the App
          # installation holds. Request the three this job actually uses:
          # contents to push the branch, pull-requests to open the PR,
          # issues to file the urgent tracking issue.
          permission-contents: write
          permission-pull-requests: write
          permission-issues: write

      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version-file: '.nvmrc'

      - name: Check pinned Emby version
        id: check
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: node scripts/emby-version-check.mjs

      - name: Open or update bump PR
        if: steps.check.outputs.status != 'ok'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          STATUS: ${{ steps.check.outputs.status }}
          TARGET: ${{ steps.check.outputs.target }}
          PINNED: ${{ steps.check.outputs.pinned }}
          REASON: ${{ steps.check.outputs.reason }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          if [ -z "$TARGET" ]; then
            echo "::error::No surviving release in the pinned line. This needs a human: the whole line may have been pruned or retired."
            exit 1
          fi

          branch="chore/emby-version-${TARGET}"

          # Idempotency: this runs weekly against a mostly unchanged situation,
          # so an existing PR for this target is updated, never duplicated.
          existing=$(gh pr list --repo "$REPO" --head "$branch" --state open --json number --jq '.[0].number // empty')
          if [ -n "$existing" ]; then
            echo "PR #$existing already open for $TARGET; nothing to do."
            exit 0
          fi

          git config user.name "segrep-emby-bump[bot]"
          git config user.email "segrep-emby-bump[bot]@users.noreply.github.com"
          git checkout -b "$branch"
          printf '%s\n' "$TARGET" > .emby-version
          git add .emby-version
          git commit -m "ci: bump pinned Emby version to ${TARGET}

          ${REASON}"

          git push "https://x-access-token:${GH_TOKEN}@github.com/${REPO}.git" "$branch"

          body_file="$(mktemp)"
          {
            printf '## Summary\n\n'
            printf -- '- %s\n' "$REASON"
            # shellcheck disable=SC2016 # backticks below are literal Markdown code formatting, not command substitution
            printf -- '- Moves the pinned Emby reference-assembly version from `%s` to `%s`.\n\n' "$PINNED" "$TARGET"
            printf '## Why this is automated\n\n'
            # shellcheck disable=SC2016 # backticks below are literal Markdown code formatting, not command substitution
            printf 'Emby prunes old pre-releases from `MediaBrowser/Emby.Releases`, so a static pin eventually 404s and breaks CI for reasons unrelated to any change here. See #165.\n\n'
            printf '## Review guidance\n\n'
            printf 'The diff is one line. What matters is whether CI passes: a green build proves the 4.10 ABI still compiles against the new reference assemblies.\n'
          } > "$body_file"

          labels="ci,dependencies"
          if [ "$STATUS" = "urgent" ]; then
            labels="$labels,emby-pin-urgent"
          fi

          gh pr create --repo "$REPO" \
            --head "$branch" \
            --title "ci: bump pinned Emby version to ${TARGET}" \
            --label "$labels" \
            --body-file "$body_file"
          rm -f "$body_file"

      - name: Open or update urgent tracking issue
        if: steps.check.outputs.status == 'urgent'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          TARGET: ${{ steps.check.outputs.target }}
          PINNED: ${{ steps.check.outputs.pinned }}
          REASON: ${{ steps.check.outputs.reason }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          title="Emby pin ${PINNED} has been deleted upstream"

          # One reused issue, re-commented. A new issue per weekly run would bury
          # the signal it exists to raise.
          existing=$(gh issue list --repo "$REPO" --state open --search "$title in:title" --json number --jq '.[0].number // empty')
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --repo "$REPO" \
              --body "Still broken as of this run. ${REASON}"
            exit 0
          fi

          gh issue create --repo "$REPO" \
            --title "$title" \
            --label "bug,ci,emby-pin-urgent" \
            --body "${REASON}

          CI is failing until the pin moves to \`${TARGET}\`. A bump PR has been opened and will merge automatically once all checks pass.

          Tracking: #165"
