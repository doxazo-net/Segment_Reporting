name: Build and Release

on:
  push:
    branches:
      - main
      - develop
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: read

# Emby prunes old releases from MediaBrowser/Emby.Releases, so a pinned version
# eventually 404s rather than merely going stale -- 4.10.0.13 was pinned here and
# has since been deleted upstream, which is what broke this workflow. Keep the
# version in exactly one place per workflow so a bump cannot half-apply, and see
# the tracking issue for making this resilient rather than merely current.
env:
  EMBY_VERSION: "4.10.0.19"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Setup .NET
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          dotnet-version: '8.0.x'

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version-file: '.nvmrc'

      - name: Fetch Emby ${{ env.EMBY_VERSION }} reference assemblies
        run: |
          set -euo pipefail
          mkdir -p segment_reporting/embylibs
          extract_dir="$(mktemp -d)"
          url="https://github.com/MediaBrowser/Emby.Releases/releases/download/${EMBY_VERSION}/emby-server-freebsd14_${EMBY_VERSION}_amd64.tar.xz"
          curl -fsSL "$url" -o /tmp/emby.tar.xz
          tar xJf /tmp/emby.tar.xz -C "$extract_dir" --wildcards \
            '*/MediaBrowser.Model.dll' '*/MediaBrowser.Common.dll' \
            '*/MediaBrowser.Controller.dll' '*/Emby.Naming.dll'
          find "$extract_dir" \( -name 'MediaBrowser.*.dll' -o -name 'Emby.Naming.dll' \) \
            -exec cp {} segment_reporting/embylibs/ \;
          ls -la segment_reporting/embylibs/

      - name: Install JS build tools
        run: npm ci --prefix segment_reporting

      - name: Minify JS for Release
        run: npm run build:js --prefix segment_reporting

      - name: Restore dependencies
        run: dotnet restore Segment_Reporting.sln

      - name: Build with analyzers
        run: dotnet build Segment_Reporting.sln --configuration Release --no-restore -warnaserror

      - name: Run tests
        run: dotnet test Segment_Reporting.sln --configuration Release --no-build

      - name: Check code formatting
        run: dotnet format Segment_Reporting.sln --verify-no-changes --no-restore

      - name: Lint JavaScript
        run: npm run lint:js --prefix segment_reporting

      - name: Lint HTML accessibility (html-validate)
        run: npm run lint:html --prefix segment_reporting

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: segment_reporting-dll
          path: segment_reporting/bin/Release/**/segment_reporting.dll

      - name: Verify 4.9 ABI also compiles
        run: dotnet build segment_reporting/segment_reporting.csproj -c Release -p:EmbyAbi=4.9 -warnaserror

  lockfile:
    name: Lockfile integrity
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version-file: '.nvmrc'

      # Regenerating in place must be a no-op: catches a package.json edit that
      # landed without a matching lock refresh. npm ci never writes the lock, so
      # neither the build job nor the csproj Release target surfaces this.
      - name: Verify package-lock.json is in sync
        run: |
          set -euo pipefail
          # Assert the lockfile is tracked before regenerating. If it were
          # deleted in the commit, npm would recreate it as an untracked file
          # and git diff would report nothing, passing this check silently.
          if ! git ls-files --error-unmatch segment_reporting/package-lock.json >/dev/null 2>&1; then
            echo "::error::segment_reporting/package-lock.json is not tracked in git. It must be committed."
            exit 1
          fi
          npm install --prefix segment_reporting --package-lock-only --ignore-scripts
          # git status, not git diff: porcelain also reports an untracked file.
          if [ -n "$(git status --porcelain -- segment_reporting/package-lock.json)" ]; then
            git diff -- segment_reporting/package-lock.json || true
            echo "::error file=segment_reporting/package-lock.json::Lockfile is out of sync with package.json. Run 'npm install --package-lock-only' in segment_reporting/ on the Node version in .nvmrc, then commit the result."
            exit 1
          fi

      # Separate check, because the one above cannot catch this: npm treats an
      # existing complete lock as authoritative and will not re-derive missing
      # metadata, so a lock already rewritten by an old npm regenerates to
      # itself and looks clean. npm 10 and older strip every "libc" field, the
      # metadata npm uses to pick glibc vs musl builds of optional binaries
      # (sharp, rollup). The failure is all-or-nothing, so presence is a
      # sufficient canary. Regenerating from scratch would detect it too, but
      # re-resolves semver ranges and would go red on any upstream release.
      - name: Verify lockfile was written by a current npm
        run: |
          set -euo pipefail
          if ! grep -q '"libc"' segment_reporting/package-lock.json; then
            echo "::error file=segment_reporting/package-lock.json::Lockfile is missing all \"libc\" metadata, which means it was rewritten by npm 10 or older. Delete it, reinstall on the Node version in .nvmrc (npm 11+), and commit the result."
            exit 1
          fi

  release:
    needs: [build, lockfile]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Setup .NET
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          dotnet-version: '8.0.x'

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version-file: '.nvmrc'

      - name: Fetch Emby ${{ env.EMBY_VERSION }} reference assemblies
        run: |
          set -euo pipefail
          mkdir -p segment_reporting/embylibs
          extract_dir="$(mktemp -d)"
          url="https://github.com/MediaBrowser/Emby.Releases/releases/download/${EMBY_VERSION}/emby-server-freebsd14_${EMBY_VERSION}_amd64.tar.xz"
          curl -fsSL "$url" -o /tmp/emby.tar.xz
          tar xJf /tmp/emby.tar.xz -C "$extract_dir" --wildcards \
            '*/MediaBrowser.Model.dll' '*/MediaBrowser.Common.dll' \
            '*/MediaBrowser.Controller.dll' '*/Emby.Naming.dll'
          find "$extract_dir" \( -name 'MediaBrowser.*.dll' -o -name 'Emby.Naming.dll' \) \
            -exec cp {} segment_reporting/embylibs/ \;
          ls -la segment_reporting/embylibs/

      - name: Install JS build tools
        run: npm ci --prefix segment_reporting

      - name: Build dual-ABI release artifacts (one zip per Emby line)
        run: |
          set -euo pipefail
          mkdir -p "$GITHUB_WORKSPACE/release-assets"
          build_zip() {
            abi="$1"; suffix="$2"
            rm -rf segment_reporting/obj segment_reporting/bin
            dotnet build segment_reporting/segment_reporting.csproj -c Release -p:EmbyAbi="$abi" -warnaserror
            tmp="$(mktemp -d)"
            # Ship the DLL under the exact name Emby expects, bundled in a labelled zip.
            cp segment_reporting/bin/Release/netstandard2.0/segment_reporting.dll "$tmp/segment_reporting.dll"
            (cd "$tmp" && zip -q "segment_reporting_emby_${suffix}.zip" segment_reporting.dll)
            mv "$tmp/segment_reporting_emby_${suffix}.zip" "$GITHUB_WORKSPACE/release-assets/"
          }
          build_zip 4.9 4.9x
          build_zip 4.10 4.10x
          ls -la "$GITHUB_WORKSPACE/release-assets/"

      - name: Create Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3
        with:
          files: ./release-assets/*.zip
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
